services:
  trapperkeeper:
    build:
      context: .
      args:
        TK_VERSION: "1.6.0"
        TK_COMMIT: "${TK_COMMIT:-dev}"
        TK_BRANCH: "${TK_BRANCH:-main}"
    image: ghcr.io/torresmva/trapperkeeper:latest
    container_name: trapperkeeper
    ports:
      - "3001:3001"
      - "3443:3443"
    volumes:
      - trapperkeeper-data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SSL_PORT=3443
      - TK_PASSWORD=${TK_PASSWORD:-rocco}
      # ── self-update ──
      - TK_UPDATE_PROVIDER=${TK_UPDATE_PROVIDER:-github}
      - TK_UPDATE_REPO=${TK_UPDATE_REPO:-torresmva/trapperkeeper}
      - TK_UPDATE_API_URL=${TK_UPDATE_API_URL:-https://api.github.com}
      - TK_UPDATE_IMAGE=${TK_UPDATE_IMAGE:-ghcr.io/torresmva/trapperkeeper}
      - TK_UPDATE_TOKEN=${TK_UPDATE_TOKEN:-}
      - TK_WARDEN_URL=http://tk-warden:3002

  warden:
    build:
      context: ./warden
    image: ghcr.io/torresmva/trapperkeeper-warden:latest
    container_name: tk-warden
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    environment:
      - TK_CONTAINER=trapperkeeper
      - TK_HEALTH_URL=http://trapperkeeper:3001/api/update/health

volumes:
  trapperkeeper-data:
    driver: local
    # to persist data to a host directory instead:
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /path/to/your/data
