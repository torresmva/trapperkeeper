services:
  trapperkeeper:
    build:
      context: .
      args:
        TK_VERSION: "1.4.9"
        TK_COMMIT: "${TK_COMMIT:-dev}"
        TK_BRANCH: "${TK_BRANCH:-main}"
    image: ghcr.io/torresmva/trapperkeeper:latest
    container_name: trapperkeeper
    ports:
      - "3001:3001"
      - "3443:3443"
    volumes:
      - trapperkeeper-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      # mount this compose file so the container can restart itself on update
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SSL_PORT=3443
      - TK_PASSWORD=rocco
      # ── self-update system ──
      - TK_UPDATE_PROVIDER=${TK_UPDATE_PROVIDER:-github}
      - TK_UPDATE_REPO=${TK_UPDATE_REPO:-torresmva/trapperkeeper}
      - TK_UPDATE_API_URL=${TK_UPDATE_API_URL:-https://api.github.com}
      - TK_UPDATE_IMAGE=${TK_UPDATE_IMAGE:-ghcr.io/torresmva/trapperkeeper}
      - TK_UPDATE_TOKEN=${TK_UPDATE_TOKEN:-}
      # for private gitlab instead:
      #   TK_UPDATE_PROVIDER=gitlab
      #   TK_UPDATE_REPO=home-projects/trapperkeeper
      #   TK_UPDATE_API_URL=http://your-gitlab:8080
      #   TK_UPDATE_IMAGE=your-registry:5050/home-projects/trapperkeeper

volumes:
  trapperkeeper-data:
    driver: local
    # for bind mount deployment:
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /opt/trapperkeeper-data
